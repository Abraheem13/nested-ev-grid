# NFL-EV v2 base configuration
# All experiments compose: base.yaml + network/*.yaml + dataset/*.yaml + method/*.yaml
seed: 0
device: auto

simulation:
  resolution_s: 60          # quasi-static time-series resolution (QSTS standard).
                            # Set to 1 for high-resolution validation runs (R1.4).
  dispatch_interval_s: 900  # Level 2 decision interval (15 min)
  pricing_interval_s: 3600  # Level 1 decision interval (1 h)
  episode_hours: 24
  load_noise_sigma: 0.02    # per-step multiplicative household load noise

voltage:
  v_min: 0.95               # IEEE 1547-2018 floor (p.u.)
  v_max: 1.05
  v_critical: 0.90          # full reactive support threshold
  correction_margin: 0.001  # controller targets v_min + margin (fixes S4=0.9498, R2.3)
  max_correction_iters: 8   # PF re-solve iterations per timestep

reactive_power:
  # R1.2 / R2.2 fix: Q capacity from inverter apparent rating, NOT active power.
  # Qmax_i = sqrt(S_rated^2 - P_i^2)  -> full STATCOM-mode Q at P=0.
  s_rated_kva: 12.0          # per-charger inverter rating (11 kW charger + Q headroom)
  charger_p_max_kw: 11.0
  charger_efficiency: 0.95
  curtailment_fallback: true # last-resort active power curtailment when Q exhausted
  curtailment_step: 0.2      # fraction of charging power shed per fallback iteration

level1:  # DSO meta-controller (PPO)
  state_dim: 8               # +2 vs v1: line loading margin, substation loading (R3.4)
  price_floor: 0.05          # $/kWh absolute bounds on corridor
  price_ceil: 0.30
  min_corridor_width: 0.02
  reward:
    alpha_cost: 1.0
    alpha_vsq: 50.0
    alpha_vind: 10.0
    alpha_sat: 5.0
    alpha_thermal: 5.0       # new: line/transformer overload penalty (R3.4)

level2:  # Aggregator agents (DDPG)
  n_aggregators: 5
  transformer_cap_kw: 500    # per-aggregator P_cap
  reward:
    beta_cost: 1.0
    beta_unmet: 20.0
  # R1.3 fix: agent selects execution price within L1 corridor (extra action dim)
  price_selection: true
  # R1.5 fix: differentiable projection onto {c : sum(c) <= P_cap, 0 <= c_i <= c_max}
  action_projection: simplex_scale

level3:
  # R1.4 fix: split into two non-parametric sub-layers at distinct frequencies
  behavior_interval_s: 900   # Fishbein evaluated at dispatch boundaries only
  behavior:
    lambda_ref: 0.15         # $/kWh reference residential rate
    w_cost: [5.0, 1.0]       # N(mu, sigma) per-user cost sensitivity
    w_norm: [2.0, 0.5]
    bias: [0.0, 0.5]
  q_control_interval_s: 1    # conceptual; realized within QSTS step via correction loop

curriculum:
  stages:
    - {penetration: 0.2, v_bounds: [0.90, 1.10], stochastic: false}
    - {penetration: 0.4, v_bounds: [0.93, 1.07], stochastic: false}
    - {penetration: 0.6, v_bounds: [0.95, 1.05], stochastic: true}
    - {penetration: 0.8, v_bounds: [0.95, 1.05], stochastic: true}
    - {penetration: 0.8, v_bounds: [0.95, 1.05], stochastic: true, episode_hours: 48}
  # R1.7 fix: violation rate replaced as advancement metric
  advance_metrics: [cost_threshold, q_activation_freq, curtailment_freq]
  advance_window_episodes: 20

training:
  total_timesteps: 400000
  ppo: {lr: 3.0e-4, gamma: 0.99, gae_lambda: 0.95, clip: 0.2, epochs: 10}
  ddpg: {lr_actor: 1.0e-4, lr_critic: 1.0e-3, tau: 0.005, batch: 64, buffer: 200000}

evaluation:
  n_episodes: 50
  scenarios:
    S1: {penetration: 0.40, n_ev: 30}
    S2: {penetration: 0.67, n_ev: 50}
    S3: {penetration: 0.80, n_ev: 60}
    S4: {penetration: 0.80, n_ev: 60, load_forecast_noise: 0.15}
    S5: {penetration: 1.00, n_ev: 75}
    S6_deadlock: {penetration: 0.80, n_ev: 60, force_zero_charging_window: [19, 20]}
    S7_q_exhaustion: {penetration: 1.20, n_ev: 90, s_rated_derate: 0.5}

network_operating_point:
  # Explicit nominal operating point (addresses R3.1: assumptions now stated).
  # Substation OLTC regulated setpoint + base-load scaling such that the
  # no-EV feeder is IEEE 1547 compliant (nominal vmin ~= 0.96 p.u.).
  ext_grid_vm_pu: 1.03
  base_load_scale: 0.85
